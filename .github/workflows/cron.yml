name: Pentellia Cron Jobs

on:
  schedule:
    # Stale scan recovery — every 15 minutes (free on GitHub Actions)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  stale-scans:
    name: Recover stale scans
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call stale-scans cron
        run: |
          RESPONSE=$(curl -s -o /tmp/cron_response.txt -w "%{http_code}" \
            -X GET https://pentellia.io/api/cron/stale-scans \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          BODY=$(cat /tmp/cron_response.txt)
          echo "HTTP Status: $RESPONSE"
          echo "Response: $BODY"
          if [ "$RESPONSE" = "401" ]; then
            echo "ERROR: Unauthorized — CRON_SECRET mismatch or Vercel not redeployed"
            exit 1
          fi
          if [ "$RESPONSE" = "000" ]; then
            echo "ERROR: Could not reach pentellia.io"
            exit 1
          fi
          echo "Cron completed successfully"